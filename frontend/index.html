<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KT 상품 탐색기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['-apple-system','BlinkMacSystemFont','SF Pro Display','Helvetica Neue','sans-serif'] },
          colors: { kt: { dark: '#1d1d1f', mid: '#2d2d2f', gray: '#6e6e73', light: '#a1a1a6', bg: '#f5f5f7' } }
        }
      }
    }
  </script>
  <style>
    * { -webkit-font-smoothing: antialiased; }
    .tab-btn { transition: all .2s; }
    .tab-btn.active { background: #1d1d1f; color: #f5f5f7; }
    .tab-btn:not(.active):hover { background: #e5e5ea; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .card { transition: all .2s ease; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); border-color: #1d1d1f !important; }
    .chip { transition: all .15s; }
    .chip:hover { background: #1d1d1f; color: #f5f5f7; border-color: #1d1d1f; }
    .chat-bubble-user { background: #1d1d1f; color: #f5f5f7; border-radius: 18px 18px 4px 18px; }
    .chat-bubble-bot  { background: #fff; color: #1d1d1f; border: 1px solid #e5e5ea; border-radius: 18px 18px 18px 4px; box-shadow: 0 1px 6px rgba(0,0,0,.05); }
    .typing span { display:inline-block; width:6px; height:6px; background:#a1a1a6; border-radius:50%; margin:0 2px; animation: bounce .9s infinite; }
    .typing span:nth-child(2) { animation-delay:.15s; }
    .typing span:nth-child(3) { animation-delay:.3s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    #chat-messages { scroll-behavior: smooth; }
    .prose p { margin-bottom: .6em; }
    .prose strong { font-weight: 600; }
    .prose ul { list-style: disc; padding-left: 1.2em; margin: .4em 0; }
    .prose li { margin-bottom: .2em; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d2d2d7; border-radius: 4px; }
  </style>
</head>
<body class="bg-kt-bg min-h-screen font-sans">

<!-- ── Hero Header ─────────────────────────────────────────────────────── -->
<div class="bg-gradient-to-br from-white to-gray-100 border border-gray-200 mx-6 mt-6 rounded-2xl px-10 py-10 text-center shadow-sm">
  <span class="inline-block bg-gray-100 border border-gray-200 text-kt-gray text-xs tracking-widest uppercase px-3 py-1 rounded-full mb-4">KT Enterprise</span>
  <h1 class="text-4xl font-bold text-kt-dark tracking-tight mb-2">상품 탐색기</h1>
  <p class="text-kt-gray text-base">KT 상품을 찾고, 이해하고, 비교하세요</p>
</div>

<!-- ── Tab Nav ─────────────────────────────────────────────────────────── -->
<div class="flex gap-2 mx-6 mt-5 flex-wrap">
  <button class="tab-btn active px-5 py-2.5 rounded-xl text-sm font-medium" onclick="switchTab('catalog')">📦  상품 카탈로그</button>
  <button class="tab-btn px-5 py-2.5 rounded-xl text-sm font-medium text-kt-dark bg-white border border-gray-200" onclick="switchTab('qa')">💬  상품 Q&A</button>
  <button class="tab-btn px-5 py-2.5 rounded-xl text-sm font-medium text-kt-dark bg-white border border-gray-200" onclick="switchTab('customer')">🏢  고객사 리서치</button>
  <button class="tab-btn px-5 py-2.5 rounded-xl text-sm font-medium text-kt-dark bg-white border border-gray-200" onclick="switchTab('market')">📊  시장 동향</button>
</div>

<!-- ── Main Content ────────────────────────────────────────────────────── -->
<div class="mx-6 mt-4 mb-10">

  <!-- ┌─ Tab 1: 상품 카탈로그 ────────────────────────────────────────────┐ -->
  <div id="tab-catalog" class="tab-panel active">
    <div class="flex gap-5">

      <!-- 카드 그리드 -->
      <div class="flex-1">
        <p class="text-sm text-kt-gray mb-3">카드를 클릭하면 상세 정보를 확인할 수 있습니다.</p>
        <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-3"></div>

        <!-- 전체 카탈로그 accordion -->
        <div class="mt-5 bg-white rounded-2xl border border-gray-200 overflow-hidden">
          <button onclick="toggleCatalog()" class="w-full flex justify-between items-center px-5 py-4 text-sm font-medium text-kt-dark hover:bg-gray-50 transition">
            <span>📋  KT 전체 상품 카탈로그 (참고용)</span>
            <span id="catalog-arrow" class="text-kt-gray text-lg transition-transform">›</span>
          </button>
          <div id="catalog-body" class="hidden px-5 pb-5 text-sm text-kt-dark">
            <div class="grid grid-cols-2 lg:grid-cols-3 gap-4 pt-2" id="full-catalog-grid"></div>
          </div>
        </div>
      </div>

      <!-- 상세 패널 -->
      <div class="w-[440px] shrink-0">
        <div id="detail-panel" class="bg-white rounded-2xl border border-gray-200 p-5 sticky top-4 min-h-52">
          <p class="text-kt-light text-sm text-center mt-8">← 상품 카드를 클릭하면<br>상세 정보가 여기에 표시됩니다</p>
        </div>
      </div>

    </div>
  </div>
  <!-- └──────────────────────────────────────────────────────────────────┘ -->

  <!-- ┌─ Tab 2: Q&A ─────────────────────────────────────────────────────┐ -->
  <div id="tab-qa" class="tab-panel">
    <div class="max-w-2xl mx-auto flex flex-col" style="height:68vh">

      <!-- 메시지 영역 -->
      <div id="chat-messages" class="flex-1 overflow-y-auto bg-white rounded-2xl border border-gray-200 p-5 space-y-4 mb-3">
        <div class="text-center text-kt-light text-sm py-8">
          <p class="text-2xl mb-2">💬</p>
          <p>상품에 대해 자유롭게 질문하세요</p>
          <p class="text-xs mt-1">스펙, 요금, 비교, 도입 방법 등 무엇이든</p>
        </div>
        <!-- 예시 버튼 -->
        <div class="flex flex-wrap justify-center gap-2 pb-2" id="example-chips"></div>
      </div>

      <!-- 입력창 -->
      <div class="flex gap-2 bg-white border border-gray-200 rounded-2xl p-3">
        <button onclick="resetChat()" title="대화 초기화"
          class="text-kt-light hover:text-kt-dark transition self-end pb-1.5 px-1 text-lg">↺</button>
        <textarea id="chat-input" rows="1"
          placeholder="메시지를 입력하세요..."
          onkeydown="handleChatKey(event)"
          class="flex-1 resize-none text-sm focus:outline-none py-1 px-2 leading-relaxed max-h-24"></textarea>
        <button onclick="sendChat()" class="bg-kt-dark text-white px-5 py-2 rounded-xl text-sm font-medium hover:opacity-85 transition self-end">
          전송
        </button>
      </div>

    </div>
  </div>
  <!-- └──────────────────────────────────────────────────────────────────┘ -->

  <!-- ┌─ Tab 3: 고객사 리서치 ────────────────────────────────────────────┐ -->
  <div id="tab-customer" class="tab-panel">
    <div class="max-w-3xl mx-auto">
      <div class="bg-white rounded-2xl border border-gray-200 p-7 shadow-sm mb-4">
        <h2 class="text-lg font-semibold text-kt-dark mb-1">고객사 리서치</h2>
        <p class="text-sm text-kt-gray mb-4">고객사명을 입력하면 기업 현황 분석과 KT 상품 추천을 제공합니다.</p>
        <div class="flex gap-2">
          <input id="customer-input" type="text" placeholder="예: 삼성전자, LG화학, 현대자동차..."
            onkeydown="if(event.key==='Enter') runCustomer()"
            class="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-kt-dark transition" />
          <button onclick="runCustomer()" class="bg-kt-dark text-white px-6 py-3 rounded-xl text-sm font-medium hover:opacity-85 transition whitespace-nowrap">
            분석 시작
          </button>
        </div>
      </div>

      <!-- 진행 상태 -->
      <div id="customer-progress" class="hidden bg-white rounded-2xl border border-gray-200 p-5 mb-4">
        <div id="customer-steps" class="space-y-2"></div>
      </div>

      <!-- 결과 -->
      <div id="customer-result" class="hidden space-y-4">
        <div class="bg-white rounded-2xl border border-gray-200 p-6">
          <h3 class="text-sm font-semibold text-kt-gray uppercase tracking-wide mb-3">기업 현황 분석</h3>
          <div id="customer-analysis" class="prose text-sm text-kt-dark leading-relaxed"></div>
        </div>
        <div class="bg-white rounded-2xl border border-gray-200 p-6">
          <h3 class="text-sm font-semibold text-kt-gray uppercase tracking-wide mb-3">KT 상품 추천</h3>
          <div id="customer-recommendation" class="prose text-sm text-kt-dark leading-relaxed"></div>
        </div>
      </div>
    </div>
  </div>
  <!-- └──────────────────────────────────────────────────────────────────┘ -->

  <!-- ┌─ Tab 4: 시장 동향 ────────────────────────────────────────────────┐ -->
  <div id="tab-market" class="tab-panel">
    <div class="max-w-3xl mx-auto">
      <div class="bg-white rounded-2xl border border-gray-200 p-7 shadow-sm mb-4">
        <h2 class="text-lg font-semibold text-kt-dark mb-1">시장 동향 리서치</h2>
        <p class="text-sm text-kt-gray mb-4">상품명과 산업군을 선택하면 시장 동향 보고서를 생성합니다.</p>
        <div class="flex gap-2 mb-3">
          <input id="market-product" type="text" placeholder="상품명 예: 클라우드, 5G, AI 보안..."
            class="flex-1 border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-kt-dark transition" />
          <select id="market-industry"
            class="border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-kt-dark transition bg-white text-kt-dark">
            <option value="">산업군 선택</option>
          </select>
        </div>
        <button onclick="runMarket()" class="w-full bg-kt-dark text-white py-3 rounded-xl text-sm font-medium hover:opacity-85 transition">
          보고서 생성
        </button>
      </div>

      <!-- 진행 상태 -->
      <div id="market-progress" class="hidden bg-white rounded-2xl border border-gray-200 p-5 mb-4">
        <div id="market-steps" class="space-y-2"></div>
      </div>

      <!-- 결과 -->
      <div id="market-result" class="hidden bg-white rounded-2xl border border-gray-200 p-6 space-y-5"></div>
    </div>
  </div>
  <!-- └──────────────────────────────────────────────────────────────────┘ -->

</div>

// ── 초기화 ────────────────────────────────────────────────────────────────

function init() {
  renderProductGrid();
  renderFullCatalog();
  renderQAExamples();
}

function renderProductGrid() {
  const grid = document.getElementById('product-grid');
  grid.innerHTML = PRODUCTS.map(p => `
    <button onclick="loadProductDetail('${p.id}')"
      class="card bg-white border border-gray-200 rounded-2xl p-4 text-left cursor-pointer w-full">
      <div class="text-2xl mb-2">${p.emoji}</div>
      <div class="font-semibold text-kt-dark text-sm leading-snug mb-1">${p.name}</div>
      <div class="text-xs text-kt-gray mb-2">${p.category}</div>
      <div class="text-xs text-kt-light leading-relaxed">${p.tagline}</div>
    </button>
  `).join('');
}

function renderFullCatalog() {
  const grid = document.getElementById('full-catalog-grid');
  grid.innerHTML = FULL_CATALOG.map(cat => `
    <div>
      <div class="font-semibold text-kt-dark text-xs uppercase tracking-wide border-b border-gray-100 pb-1.5 mb-2">${cat.category}</div>
      ${cat.subs.map(sub => `
        <div class="mb-2.5">
          ${sub.name ? `<div class="text-xs text-kt-gray font-medium mb-1">${sub.name}</div>` : ''}
          <ul class="space-y-0.5 pl-2">
            ${sub.items.map(i => `
              <li class="text-xs ${i.includes('✅') ? 'text-kt-dark' : 'text-kt-light'}">${i}</li>
            `).join('')}
          </ul>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function renderQAExamples() {
  const el = document.getElementById('example-chips');
  el.innerHTML = QA_EXAMPLES.map(q => `
    <button onclick="useExample('${q}')"
      class="chip border border-gray-200 rounded-xl px-3 py-1.5 text-xs text-kt-dark bg-white">
      ${q}
    </button>
  `).join('');
}

// ── Tab 전환 ──────────────────────────────────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.classList.remove('active');
    b.classList.add('bg-white','border','border-gray-200','text-kt-dark');
  });
  document.getElementById('tab-' + name).classList.add('active');
  const idx = ['catalog','qa','customer','market'].indexOf(name);
  const btn = document.querySelectorAll('.tab-btn')[idx];
  btn.classList.add('active');
  btn.classList.remove('bg-white','border','border-gray-200','text-kt-dark');
}

// ── 상품 상세 ─────────────────────────────────────────────────────────────

async function loadProductDetail(productId) {
  const p = PRODUCTS.find(x => x.id === productId);
  if (!p) return;

  const panel = document.getElementById('detail-panel');
  panel.innerHTML = `
    <div class="flex items-center gap-2 mb-3">

// ── 채팅 Q&A ─────────────────────────────────────────────────────────────

function resetChat() {
  chatHistory = [];
  document.getElementById('chat-messages').innerHTML = `
    <div class="text-center text-kt-light text-sm py-8">
      <p class="text-2xl mb-2">💬</p>
      <p>상품에 대해 자유롭게 질문하세요</p>
      <p class="text-xs mt-1">스펙, 요금, 비교, 도입 방법 등 무엇이든</p>
    </div>
    <div class="flex flex-wrap justify-center gap-2 pb-2" id="example-chips"></div>`;
  renderQAExamples();
}

function useExample(q) {
  document.getElementById('chat-input').value = q;
  sendChat();
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message) return;
  input.value = '';

  // 예시 칩 숨기기
  document.getElementById('example-chips').innerHTML = '';

  appendMessage('user', message);
  const botId = appendMessage('bot', '');
  showTyping(botId);

  try {
    const res = await fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, history: chatHistory }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let finalContent = '';
    let ragFailed = false;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop();
      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;
        const payload = JSON.parse(part.slice(6));
        if (payload.type === 'token') {
          finalContent = payload.content;
          updateMessage(botId, finalContent);
        } else if (payload.type === 'rag_failed') {
          ragFailed = true;
        }
      }
    }

    chatHistory.push({ role: 'user', content: message });
    chatHistory.push({ role: 'assistant', content: finalContent });

    // RAG 실패 시 웹 검색 제안 버튼 추가
    if (ragFailed) {
      appendWebSearchOffer(message);
    }

  } catch(e) {
    updateMessage(botId, '⚠️ 오류가 발생했습니다. 다시 시도해주세요.');
  }
}

function appendWebSearchOffer(originalQuery) {
  const container = document.getElementById('chat-messages');
  const offerId = 'offer-' + Date.now();
  const div = document.createElement('div');
  div.className = 'flex justify-start';
  div.id = offerId;
  div.innerHTML = `
    <div class="chat-bubble-bot px-4 py-3 text-sm max-w-xs lg:max-w-md">
      <p class="text-kt-gray text-xs mb-2">브로슈어에서 관련 정보를 찾지 못했습니다.<br>웹 검색으로 추가 정보를 찾아드릴까요?</p>
      <button onclick="doWebSearch('${originalQuery.replace(/'/g,"\\'")}', '${offerId}')"
        class="bg-blue-50 text-blue-600 border border-blue-200 rounded-lg px-3 py-1.5 text-xs hover:bg-blue-100 transition font-medium">
        🔍 웹에서 검색하기
      </button>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function doWebSearch(query, offerId) {
  // 제안 버튼 제거
  const offerEl = document.getElementById(offerId);
  if (offerEl) offerEl.remove();

  appendMessage('user', `🔍 "${query}" 웹 검색`);
  const botId = appendMessage('bot', '');
  showTyping(botId);

  try {
    const res = await fetch('/api/chat/websearch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let finalContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop();
      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;
        const payload = JSON.parse(part.slice(6));
        if (payload.type === 'token') {
          finalContent = payload.content;
          updateMessage(botId, finalContent);
        }
      }
    }

    chatHistory.push({ role: 'user', content: query });
    chatHistory.push({ role: 'assistant', content: finalContent });

  } catch(e) {
    updateMessage(botId, '⚠️ 웹 검색 중 오류가 발생했습니다.');
  }
}

function appendMessage(role, content) {
  const id = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2);
  const container = document.getElementById('chat-messages');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
  div.innerHTML = `
    <div id="${id}" class="${isUser ? 'chat-bubble-user' : 'chat-bubble-bot'} px-4 py-3 text-sm max-w-xs lg:max-w-md leading-relaxed">
      ${content ? md(content) : ''}
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return id;
}

function showTyping(id) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
}

function updateMessage(id, content) {
  const el = document.getElementById(id);
  if (el) {
    el.innerHTML = md(content);
    el.closest('#chat-messages').scrollTop = el.closest('#chat-messages').scrollHeight;
  }
}

// ── 전체 카탈로그 토글 ────────────────────────────────────────────────────

function toggleCatalog() {
  const body = document.getElementById('catalog-body');
  const arrow = document.getElementById('catalog-arrow');
  body.classList.toggle('hidden');
  arrow.style.transform = body.classList.contains('hidden') ? '' : 'rotate(90deg)';

// ── 마크다운 간이 파서 ────────────────────────────────────────────────────

function md(text) {
  if (!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^###\s(.+)$/gm,'<h3 class="font-semibold mt-2 mb-1 text-kt-dark">$1</h3>')
    .replace(/^##\s(.+)$/gm,'<h2 class="font-bold mt-3 mb-1 text-kt-dark">$1</h2>')
    .replace(/^#\s(.+)$/gm,'<h1 class="font-bold mt-3 mb-1 text-kt-dark text-base">$1</h1>')
    .replace(/^[-•]\s(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/gs,'<ul class="list-disc pl-4 my-1 space-y-0.5">$1</ul>')
    .replace(/📄/g,'📄')
    .replace(/\n\n/g,'</p><p class="mb-1">')
    .replace(/\n/g,'<br>')
    .replace(/^(?!<[hup])(.+)$/gm,'<p class="mb-1">$1</p>');
}

// ── 고객사 리서치 ─────────────────────────────────────────────────────────

function showStep(containerId, msg, step, total, done = false) {
  const el = document.getElementById(containerId);
  const existing = document.getElementById(`step-${step}`);
  const html = `
    <div id="step-${step}" class="flex items-center gap-2 text-sm">
      ${done
        ? '<span class="text-green-500">✓</span>'
        : '<div class="typing"><span></span><span></span><span></span></div>'}
      <span class="${done ? 'text-kt-dark' : 'text-kt-gray'}">${msg}</span>
    </div>`;
  if (existing) existing.outerHTML = html;
  else el.insertAdjacentHTML('beforeend', html);
}

async function runCustomer() {
  const name = document.getElementById('customer-input').value.trim();
  if (!name) return;

  document.getElementById('customer-progress').classList.remove('hidden');
  document.getElementById('customer-result').classList.add('hidden');
  document.getElementById('customer-steps').innerHTML = '';

  const res = await fetch('/api/customer/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ company_name: name }),
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const parts = buffer.split('\n\n');
    buffer = parts.pop();
    for (const part of parts) {
      if (!part.startsWith('data: ')) continue;
      const payload = JSON.parse(part.slice(6));
      if (payload.type === 'progress') {
        showStep('customer-steps', payload.msg, payload.step, payload.total);
      } else if (payload.type === 'result') {
        // 완료 표시
        [1,2,3].forEach(i => {
          const el = document.getElementById(`step-${i}`);
          if (el) el.querySelector('div,span:first-child').outerHTML = '<span class="text-green-500">✓</span>';
        });
        document.getElementById('customer-analysis').innerHTML = md(payload.analysis);
        document.getElementById('customer-recommendation').innerHTML = md(payload.recommendation);
        document.getElementById('customer-result').classList.remove('hidden');
      } else if (payload.type === 'error') {
        document.getElementById('customer-steps').innerHTML += `<p class="text-red-400 text-sm">${payload.content}</p>`;
      }
    }
  }
}

async function loadIndustries() {
  const res = await fetch('/api/market/industries');
  const data = await res.json();
  const sel = document.getElementById('market-industry');
  data.industries.forEach(ind => {
    const opt = document.createElement('option');
    opt.value = ind;
    opt.textContent = ind;
    sel.appendChild(opt);
  });
}

async function runMarket() {
  const product = document.getElementById('market-product').value.trim();
  const industry = document.getElementById('market-industry').value;
  if (!product || !industry) {
    alert('상품명과 산업군을 모두 입력해주세요.');
    return;
  }

  document.getElementById('market-progress').classList.remove('hidden');
  document.getElementById('market-result').classList.add('hidden');
  document.getElementById('market-steps').innerHTML = '';

  const res = await fetch('/api/market/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ product_name: product, industry }),
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const parts = buffer.split('\n\n');
    buffer = parts.pop();
    for (const part of parts) {
      if (!part.startsWith('data: ')) continue;
      const payload = JSON.parse(part.slice(6));
      if (payload.type === 'progress') {
        showStep('market-steps', payload.msg, payload.step, payload.total);
      } else if (payload.type === 'result') {
        renderMarketReport(payload.report);
      } else if (payload.type === 'error') {
        document.getElementById('market-steps').innerHTML += `<p class="text-red-400 text-sm">${payload.content}</p>`;
      }
    }
  }
}

function renderMarketReport(r) {
  const sections = [
    { key: 'market_overview',      label: '1. 시장 개요',        list: false },
    { key: 'key_trends',           label: '2. 주요 트렌드',       list: true  },
    { key: 'competitive_landscape',label: '3. 경쟁 환경',         list: false },
    { key: 'opportunities',        label: '4. 기회 요인',         list: true  },
    { key: 'threats',              label: '5. 위협 및 리스크',    list: true  },
    { key: 'summary',              label: '6. 시사점 및 전략적 제언', list: false },
  ];

  const resultEl = document.getElementById('market-result');
  resultEl.innerHTML = `
    <div class="flex items-center gap-2 pb-3 border-b border-gray-100">
      <span class="text-lg">📊</span>
      <div>
        <div class="font-semibold text-kt-dark text-sm">${r.product_name} / ${r.industry}</div>
        <div class="text-xs text-kt-gray">시장 동향 보고서</div>
      </div>
    </div>
    ${sections.map(s => {
      const val = r[s.key];
      if (!val || (Array.isArray(val) && val.length === 0)) return '';
      const content = s.list
        ? `<ul class="list-disc pl-4 space-y-1">${val.map(i => `<li>${i}</li>`).join('')}</ul>`
        : `<p>${val}</p>`;
      return `
        <div class="pt-1">
          <div class="text-xs font-semibold text-kt-gray uppercase tracking-wide mb-1.5">${s.label}</div>
          <div class="text-sm text-kt-dark leading-relaxed">${content}</div>
        </div>`;
    }).join('')}
    ${r.sources?.length ? `
      <div class="pt-3 border-t border-gray-100">
        <div class="text-xs text-kt-light">📎 참고 ${r.sources.length}건</div>
      </div>` : ''}`;
  resultEl.classList.remove('hidden');
}
